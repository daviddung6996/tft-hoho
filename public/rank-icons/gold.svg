<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-body" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#EAB308"/>
      <stop offset="70%" stop-color="#CA8A04"/>
      <stop offset="100%" stop-color="#A16207"/>
    </linearGradient>
    <linearGradient id="gold-edge" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <radialGradient id="gold-glow" cx="32" cy="32" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CA8A04" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="url(#gold-body)" stroke="url(#gold-edge)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Outer trace -->
  <polygon points="32,10 51,20 51,44 32,54 13,44 13,20" fill="none" stroke="#FEF3C7" stroke-width="0.8" stroke-linejoin="round" opacity="0.4"/>
  <!-- Shield hex -->
  <polygon points="32,18 44,25 44,39 32,46 20,39 20,25" fill="#A16207" stroke="#FDE68A" stroke-width="1" stroke-linejoin="round"/>
  <!-- Radial glow -->
  <circle cx="32" cy="32" r="10" fill="url(#gold-glow)"/>
  <!-- Inner hex -->
  <polygon points="32,24 38,28 38,36 32,40 26,36 26,28" fill="#EAB308" stroke="#FEF3C7" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Center jewel -->
  <circle cx="32" cy="32" r="3.5" fill="#CA8A04" stroke="#FDE68A" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="1.5" fill="#FDE68A"/>
  <!-- Cardinal accents -->
  <circle cx="32" cy="18" r="1" fill="#FEF3C7" opacity="0.6"/>
  <circle cx="32" cy="46" r="1" fill="#FEF3C7" opacity="0.6"/>
  <circle cx="20" cy="32" r="1" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="44" cy="32" r="1" fill="#FEF3C7" opacity="0.4"/>
</svg>
