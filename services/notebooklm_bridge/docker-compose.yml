services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: notebooklm-bridge:latest
    container_name: notebooklm-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NOTEBOOKLM_STORAGE_STATE_PATH: /app/secrets/storage_state.json
      PORT: 8080
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
    volumes:
      - ./secrets/storage_state.json:/app/secrets/storage_state.json:ro
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/live', timeout=5).read()",
        ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
